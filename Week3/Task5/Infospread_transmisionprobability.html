<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boids - Task 5: Probabilistic Spread</title>
    <style>
        body { display: flex; font-family: 'Segoe UI', sans-serif; background-color: #1e1e1e; color: #ffffff; margin: 0; padding: 20px; gap: 20px; }
        canvas { background-color: #2d2d2d; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); flex-shrink: 0; }
        .sidebar { display: flex; flex-direction: column; gap: 20px; max-width: 400px; }
        .panel { background: #2d2d2d; padding: 20px; border-radius: 8px; }
        .panel h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #444; padding-bottom: 10px; }
        label { display: flex; flex-direction: column; font-size: 14px; font-weight: bold; margin-bottom: 15px; }
        span.val { font-weight: normal; color: #aaaaaa; }
        .btn { background: #00ffcc; color: #000; border: none; padding: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <canvas id="boidsCanvas" width="800" height="600"></canvas>
    <div class="sidebar">
        <div class="panel">
            <h2>Simulation Controls</h2>
            <button class="btn" id="resetBtn">Restart Spread</button><br><br>
            <label>Transmission Radius: <span class="val" id="traVal">40</span>
                <input type="range" id="transmission" min="10" max="100" step="1" value="40">
            </label>
            <label>Probable Transmission (%): <span class="val" id="proVal">10</span>
                <input type="range" id="probability" min="1" max="100" step="1" value="10">
            </label>
            <label>Evacuation Strength: <span class="val" id="evaVal">4.0</span>
                <input type="range" id="evacuation" min="0" max="10" step="0.5" value="4.0">
            </label>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('boidsCanvas');
        const ctx = canvas.getContext('2d');

        const params = { transmission: 40, probability: 10, evacuation: 4.0, radius: 50, maxSpeed: 4.0, maxForce: 0.1 };
        const safeZone = { pos: { x: 700, y: 100 }, radius: 40 };

        ['transmission', 'probability', 'evacuation'].forEach(id => {
            const el = document.getElementById(id);
            const valSpan = document.getElementById(id.substring(0, 3) + 'Val');
            el.addEventListener('input', (e) => {
                params[id] = parseFloat(e.target.value);
                valSpan.textContent = e.target.value;
            });
        });

        class Vec2 {
            constructor(x, y) { this.x = x; this.y = y; }
            add(v) { this.x += v.x; this.y += v.y; return this; }
            sub(v) { this.x -= v.x; this.y -= v.y; return this; }
            mult(n) { this.x *= n; this.y *= n; return this; }
            div(n) { this.x /= n; this.y /= n; return this; }
            mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
            setMag(n) { this.normalize().mult(n); return this; }
            normalize() { const m = this.mag(); if (m > 0) this.div(m); return this; }
            limit(max) { if (this.mag() > max) this.setMag(max); return this; }
            dist(v) { return Math.sqrt((this.x - v.x) ** 2 + (this.y - v.y) ** 2); }
            copy() { return new Vec2(this.x, this.y); }
        }

        class Boid {
            constructor() {
                this.pos = new Vec2(Math.random() * canvas.width, Math.random() * canvas.height);
                this.vel = new Vec2((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10).setMag(params.maxSpeed);
                this.acc = new Vec2(0, 0);
                this.informed = false;
            }

            edges() {
                if (this.pos.x > canvas.width) this.pos.x = 0; else if (this.pos.x < 0) this.pos.x = canvas.width;
                if (this.pos.y > canvas.height) this.pos.y = 0; else if (this.pos.y < 0) this.pos.y = canvas.height;
            }

            applyBehaviors(boids) {
                let alignment = new Vec2(0, 0), cohesion = new Vec2(0, 0), separation = new Vec2(0, 0), evacForce = new Vec2(0, 0);
                let total = 0;

                for (let other of boids) {
                    let d = this.pos.dist(other.pos);
                    if (other !== this) {
                        // Probabilistic Information Spread
                        if (this.informed && !other.informed && d < params.transmission) {
                            if (Math.random() < (params.probability / 100)) {
                                other.informed = true;
                            }
                        }
                        
                        if (d < params.radius) {
                            alignment.add(other.vel); cohesion.add(other.pos);
                            let diff = this.pos.copy().sub(other.pos);
                            if (d > 0) diff.div(d); separation.add(diff);
                            total++;
                        }
                    }
                }

                if (total > 0) {
                    alignment.div(total).setMag(params.maxSpeed).sub(this.vel).limit(params.maxForce);
                    cohesion.div(total).sub(this.pos).setMag(params.maxSpeed).sub(this.vel).limit(params.maxForce);
                    separation.div(total).setMag(params.maxSpeed).sub(this.vel).limit(params.maxForce);
                }

                if (this.informed) {
                    let dToSafe = this.pos.dist(safeZone.pos);
                    if (dToSafe > safeZone.radius) { 
                        evacForce = new Vec2(safeZone.pos.x, safeZone.pos.y).sub(this.pos).setMag(params.maxSpeed).sub(this.vel).limit(params.maxForce * 1.5);
                    } else this.vel.mult(0.95); // Stop moving once in safe zone
                }

                this.acc.add(separation.mult(1.5)).add(alignment.mult(1.0)).add(cohesion.mult(1.0)).add(evacForce.mult(params.evacuation));
            }

            update() { this.pos.add(this.vel); this.vel.add(this.acc).limit(params.maxSpeed); this.acc.mult(0); }

            draw() {
                const theta = Math.atan2(this.vel.y, this.vel.x);
                ctx.save(); ctx.translate(this.pos.x, this.pos.y); ctx.rotate(theta);
                ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(-4, 4); ctx.lineTo(-4, -4); ctx.closePath();
                ctx.fillStyle = this.informed ? '#ffcc00' : '#00ffcc'; ctx.fill(); ctx.restore();
            }
        }

        let population = [];
        function initSimulation() {
            population = Array.from({ length: 150 }, () => new Boid());
            population[Math.floor(Math.random() * population.length)].informed = true;
        }

        document.getElementById('resetBtn').addEventListener('click', initSimulation);

        function drawSafeZone() {
            ctx.beginPath(); ctx.arc(safeZone.pos.x, safeZone.pos.y, safeZone.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(50, 255, 100, 0.2)'; ctx.fill();
            ctx.strokeStyle = 'rgba(50, 255, 100, 0.8)'; ctx.lineWidth = 2; ctx.stroke(); ctx.closePath();
            ctx.fillStyle = '#ffffff'; ctx.font = '12px Arial'; ctx.textAlign = 'center'; ctx.fillText('TARGET', safeZone.pos.x, safeZone.pos.y + 4);
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); drawSafeZone();
            for (let agent of population) { agent.applyBehaviors(population); agent.update(); agent.edges(); agent.draw(); }
            requestAnimationFrame(animate);
        }

        initSimulation(); animate();
    </script>
</body>
</html>
